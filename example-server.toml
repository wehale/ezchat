[server]
host       = "0.0.0.0"
api_port   = 8000
relay_port = 9001
ttl        = 60
log_level  = "info"

[registry]
url         = "https://ezchat.kirbus.ai"
name        = "my-server"
description = "A public ezchat server"
secret      = "CHANGE_ME"              # any random string; protects your listing from hijacking
access      = "open"
public_url  = "http://YOUR_PUBLIC_IP:8000"
# password  = ""          # only needed if access = "password"

[auth]
mode = "open"
# mode     = "password"
# password = "CHANGE_ME"
